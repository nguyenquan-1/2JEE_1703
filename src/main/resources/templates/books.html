<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sách</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f6f9;
        }

        h2 {
            color: #1f2d3d;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        .btn-add {
            display: inline-block;
            padding: 10px 16px;
            background-color: #0d6efd;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .btn-add:hover {
            background-color: #0b5ed7;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #343a40;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        .btn-edit {
            padding: 6px 12px;
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .btn-delete {
            padding: 6px 12px;
            background-color: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .btn-edit:hover {
            background-color: #5c636a;
        }

        .btn-delete:hover {
            background-color: #bb2d3b;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>QUẢN LÝ SÁCH</h2>

    <a class="btn-add" th:href="@{/books/new}">Thêm sách mới</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Tên sách</th>
            <th>Tác giả</th>
            <th>Giá</th>
            <th>Nhà xuất bản</th>
            <th>Số lượng</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${listBooks}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.price}"></td>
            <td th:text="${book.publisher}"></td>
            <td th:text="${book.quantity}"></td>
            <td>
                <a class="btn-edit" th:href="@{'/books/edit/' + ${book.id}}">Sửa</a>
                <a class="btn-delete"
                   th:href="@{'/books/delete/' + ${book.id}}"
                   onclick="return confirm('Bạn có chắc muốn xóa sách này không?')">Xóa</a>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(listBooks)}">
            <td colspan="7">Chưa có dữ liệu sách</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
