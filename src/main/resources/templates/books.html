<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sách</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f6f9;
        }

        h2 {
            color: #1f2d3d;
            text-align: center;
        }

        .container {
            width: 95%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        .top-bar, .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-info {
            font-weight: bold;
            color: #1f2d3d;
        }

        .btn-add, .btn-cart, .btn-search, .btn-page {
            display: inline-block;
            padding: 10px 16px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .btn-add { background-color: #0d6efd; }
        .btn-cart { background-color: #fd7e14; }
        .btn-search { background-color: #198754; }
        .btn-page { background-color: #6c757d; }

        .logout-form {
            display: inline;
        }

        .btn-logout {
            padding: 10px 16px;
            background-color: #198754;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #343a40;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        .btn-edit, .btn-delete, .btn-add-cart {
            padding: 6px 12px;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        .btn-edit { background-color: #6c757d; }
        .btn-delete { background-color: #dc3545; }
        .btn-add-cart { background-color: #20c997; }

        .pagination {
            margin-top: 20px;
            text-align: center;
        }

        .pagination a, .pagination span {
            margin: 0 5px;
        }

        form.inline-form {
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>QUẢN LÝ SÁCH</h2>

    <div class="top-bar">
        <div class="user-info">
            Xin chào, <span sec:authentication="name"></span>
        </div>

        <div>
            <a class="btn-cart" th:href="@{/cart}">Giỏ hàng</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button class="btn-logout" type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>

    <a class="btn-add" th:href="@{/books/new}" sec:authorize="hasRole('ADMIN')">Thêm sách mới</a>

    <form th:action="@{/books}" method="get" class="filter-bar">
        <input type="text" name="keyword" placeholder="Nhập tên sách..." th:value="${keyword}">

        <select name="category">
            <option value="">-- Chọn category --</option>
            <option th:each="c : ${categories}"
                    th:value="${c}"
                    th:text="${c}"
                    th:selected="${c == category}">
            </option>
        </select>

        <select name="sort">
            <option value="">-- Sắp xếp --</option>
            <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Giá tăng dần</option>
            <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Giá giảm dần</option>
        </select>

        <button type="submit" class="btn-search">Tìm kiếm</button>
    </form>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Tên sách</th>
            <th>Tác giả</th>
            <th>Giá</th>
            <th>Nhà xuất bản</th>
            <th>Category</th>
            <th>Số lượng</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${listBooks}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.price}"></td>
            <td th:text="${book.publisher}"></td>
            <td th:text="${book.category}"></td>
            <td th:text="${book.quantity}"></td>
            <td>
                <a class="btn-edit"
                   th:href="@{'/books/edit/' + ${book.id}}"
                   sec:authorize="hasRole('ADMIN')">Sửa</a>

                <a class="btn-delete"
                   th:href="@{'/books/delete/' + ${book.id}}"
                   sec:authorize="hasRole('ADMIN')"
                   onclick="return confirm('Bạn có chắc muốn xóa sách này không?')">Xóa</a>

                <form class="inline-form" th:action="@{'/cart/add/' + ${book.id}}" method="post">
                    <input type="number" name="quantity" value="1" min="1" style="width:60px;">
                    <button type="submit" class="btn-add-cart">Thêm giỏ</button>
                </form>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(listBooks)}">
            <td colspan="8">Chưa có dữ liệu sách</td>
        </tr>
        </tbody>
    </table>

    <div class="pagination" th:if="${totalPages > 0}">
        <a class="btn-page"
           th:if="${currentPage > 0}"
           th:href="@{/books(page=${currentPage - 1}, keyword=${keyword}, category=${category}, sort=${sort})}">
            Previous
        </a>

        <span>Trang <b th:text="${currentPage + 1}"></b> / <b th:text="${totalPages}"></b></span>

        <a class="btn-page"
           th:if="${currentPage + 1 < totalPages}"
           th:href="@{/books(page=${currentPage + 1}, keyword=${keyword}, category=${category}, sort=${sort})}">
            Next
        </a>
    </div>
</div>
</body>
</html>
